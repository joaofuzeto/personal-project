name: Sales API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3      
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run tests and build JAR
      working-directory: .
      run: mvn clean verify

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sales-api:latest .

    - name: Login on Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag and push image to ECR
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/sales-api:latest ${{ secrets.IMAGE_REPO_URL }}:${{ github.sha }}
        docker tag ${{ secrets.DOCKER_USERNAME }}/sales-api:latest ${{ secrets.IMAGE_REPO_URL }}:latest

        docker push ${{ secrets.IMAGE_REPO_URL }}:${{ github.sha }}
        docker push ${{ secrets.IMAGE_REPO_URL }}:latest

    - name: Download task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ secrets.TASK_DEFINITION_NAME }} --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ secrets.CONTAINER_NAME }}
        image: ${{ secrets.IMAGE_REPO_URL }}:latest

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ secrets.SERVICE_NAME }}
        cluster: ${{ secrets.CLUSTER_NAME }}
        wait-for-service-stability: true

    - name: Tag version to Docker Hub
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/sales-api:latest ${{ secrets.DOCKER_USERNAME }}/sales-api:${{ github.sha }}

    - name: Push to Docker Hub Container Registry
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/sales-api:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/sales-api:latest
