name: Sales API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3      
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run tests and build JAR
      working-directory: .
      run: mvn clean verify

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sales-api:latest .

    - name: Login on Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag version
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/sales-api:latest ${{ secrets.DOCKER_USERNAME }}/sales-api:${{ github.sha }}

    - name: Push to Docker Hub Container Registry
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/sales-api:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/sales-api:latest
