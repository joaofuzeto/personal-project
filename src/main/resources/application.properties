spring.application.name=sales-api

# Altera a estrutura da tabela caso a entidade tenha mudanÁas.
spring.jpa.hibernate.ddl-auto=update

# Acesso ao banco de dados
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/sales_db

# Usu·rio do banco de dados
spring.datasource.username=${DB_USER}

# Senha do banco de dados
spring.datasource.password=${DB_PASS}

# Mostrar comando mandado para o DB
spring.jpa.show-sql=true

api.security.token.secret=${JWT_SECRET:my-secret-key}



